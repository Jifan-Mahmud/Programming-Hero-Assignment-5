<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker - Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <img
          src="assets/github-logo.png"
          alt="GitHub Logo"
          class="octicon octicon-mark-github"
        />
        <h1>GitHub Issues Tracker</h1>
        <p>Sign in to manage your issues</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Enter Username"
            required
          />
          <span class="input-hint">Default: admin</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
          />
          <span class="input-hint">Default: admin123</span>
        </div>

        <button type="submit" class="sign-in-btn">Sign In</button>
        <p id="loginError">Invalid credentials. Please try again.</p>
      </form>

      <div class="divider">OR</div>

      <div class="demo-credentials">
        <p>Demo Credentials:</p>
        <div class="demo-box">
          <div><strong>Username:</strong> admin</div>
          <div><strong>Password:</strong> admin123</div>
        </div>
      </div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>

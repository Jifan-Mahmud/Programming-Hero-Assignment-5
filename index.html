<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-brand">
        <img
          src="assets/github-logo.png"
          alt="GitHub Logo"
          style="height: 32px; width: 32px"
        />
        <h2>GitHub Issues Tracker</h2>
      </div>
      <div class="nav-search">
        <input type="text" id="searchInput" placeholder="Search issues..." />
        <button id="searchBtn" class="btn-primary">Search</button>
        <button id="logoutBtn" class="btn-outline">Logout</button>
      </div>
    </nav>

    <!-- Main Content  -->
    <main class="dashboard-container">
        
        <!-- Tab Section -->
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="all">All</button>
            <button class="tab-btn" data-tab="open">Open</button>
            <button class="tab-btn" data-tab="closed">Closed</button>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="stats-left">
                <div class="stats-icon">
                    <img src="assets/Aperture.png" alt="Issues Icon" style="width: 24px; height: 24px;">
                </div>
                <div class="stats-text">
                    <h3 id="issueCount">0 Issues</h3>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class="stats-right">
                <span class="marker marker-open">Open</span>
                <span class="marker marker-closed">Closed</span>
            </div>
        </div>

        <!-- Issues Grid -->
        <div id="loadingSpinner" class="spinner-container" style="display: none;">
            <div class="spinner"></div>
            <p>Loading issues...</p>
        </div>

        <div id="issuesGrid" class="issues-grid">
            <!-- Cards JS -->
        </div>
    </main>

    <!-- Modal Layout -->
    <div id="issueModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <h2 id="modalTitle">Issue Title</h2>
            <div class="modal-meta">
                <span id="modalStatus" class="badge">Status</span>
                <span class="meta-text">Opened by <strong id="modalAuthor">Author</strong> • <span id="modalDate">Date</span></span>
            </div>
            <div id="modalLabels" class="modal-labels">
                <!-- Labels here -->
            </div>
            <p id="modalDescription" class="modal-desc">Description text...</p>
            <div class="modal-footerinfo">
                <div class="modal-assignee">
                    <span>Assignee:</span>
                    <strong id="modalAssignee">None</strong>
                </div>
                <div class="modal-priority">
                    <span>Priority:</span>
                    <span id="modalPriorityBadge" class="badge priority-badge">Priority</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-primary" id="modalCloseBtn">Close</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
